<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTA BLACK | The Void Engine</title>
    <script src="https://unpkg.com/app-info-parser@1.1.7/dist/app-info-parser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-void: #000000;
            --glass-bg: rgba(10, 10, 12, 0.65);
            --glass-border: rgba(255, 255, 255, 0.06);
            --accent-primary: #ffffff;
            --accent-glow: #1a73e8;
            --terminal-green: #00ff41;
            --terminal-red: #ff3333;
            --text-main: #f5f5f7;
            --text-muted: #86868b;
            --bezier-fluid: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; }

        body {
            background-color: var(--bg-void); color: var(--text-main);
            min-height: 100vh; padding: 3rem 1.5rem; overflow-x: hidden;
            background-image: radial-gradient(circle 800px at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(26, 115, 232, 0.08), transparent 80%);
            transition: background-image 0.1s ease;
            display: flex; flex-direction: column; align-items: center;
        }

        .ambient-grid {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 50px 50px; perspective: 1000px;
        }

        .container { width: 100%; max-width: 900px; position: relative; z-index: 10; }

        header { text-align: center; margin-bottom: 4rem; animation: slideDown 1s var(--bezier-fluid); }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }

        header h1 { 
            font-size: 4.5rem; font-weight: 900; letter-spacing: -2px; 
            margin-bottom: 0.5rem; text-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
        }
        header h1 span { color: var(--text-muted); font-weight: 300; }
        header p { color: var(--accent-glow); font-family: monospace; letter-spacing: 4px; font-size: 0.9rem; text-transform: uppercase; }

        .void-panel {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 3rem;
            backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 30px 60px rgba(0,0,0,0.6);
            transition: transform 0.4s var(--bezier-fluid), box-shadow 0.4s var(--bezier-fluid);
        }

        #drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.1); border-radius: 16px;
            padding: 3rem 1rem; cursor: pointer; text-align: center;
            transition: all 0.3s var(--bezier-fluid); position: relative; overflow: hidden;
        }

        #drop-zone::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(26,115,232,0.1) 0%, transparent 70%);
            opacity: 0; transition: opacity 0.5s; pointer-events: none;
        }

        #drop-zone:hover, #drop-zone.dragover { 
            border-color: var(--accent-glow); background: rgba(0, 0, 0, 0.4); transform: scale(1.01);
        }
        #drop-zone:hover::after { opacity: 1; }

        .drop-icon { color: var(--accent-primary); margin-bottom: 1.5rem; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); transition: transform 0.3s; }
        #drop-zone:hover .drop-icon { transform: translateY(-5px); }
        .drop-text h3 { font-size: 1.5rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 0.5rem; }
        .drop-text p { color: var(--text-muted); font-family: monospace; font-size: 0.85rem; }

        .terminal-container {
            margin-top: 1.5rem; background: #000; border: 1px solid #1a1a1a;
            border-radius: 12px; height: 160px; padding: 1.5rem;
            font-family: "SF Mono", "Courier New", monospace; font-size: 0.85rem;
            overflow-y: auto; display: none; box-shadow: inset 0 0 20px #000;
        }
        .term-line { margin-bottom: 0.4rem; color: var(--text-muted); display: flex; align-items: flex-start; gap: 10px;}
        .term-time { color: #444; font-size: 0.75rem; white-space: nowrap; }
        .term-msg { color: var(--terminal-green); }
        .term-msg.error { color: var(--terminal-red); }
        .term-msg.warn { color: #f5a623; }
        .cursor { display: inline-block; width: 8px; height: 14px; background: var(--terminal-green); animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 2px;}
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 2rem; margin-top: 3rem; }
        
        .app-card { padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; animation: popIn 0.6s var(--bezier-fluid); }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

        .app-header { display: flex; align-items: center; gap: 1.5rem; }
        .app-icon { 
            width: 72px; height: 72px; border-radius: 18px; object-fit: cover; 
            background: #000; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .app-info h3 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.2rem; }
        .app-info p { font-family: "SF Mono", monospace; font-size: 0.8rem; color: var(--text-muted); }

        .input-group { position: relative; }
        .input-group label { display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 0.5rem; }
        .url-input { 
            width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; padding: 1rem 1.2rem; border-radius: 12px; font-family: "SF Mono", monospace; 
            font-size: 0.9rem; outline: none; transition: all 0.3s var(--bezier-fluid); 
        }
        .url-input:focus { background: rgba(0, 0, 0, 0.8); border-color: var(--accent-glow); box-shadow: 0 0 0 4px rgba(26,115,232,0.1); }
        .url-input.valid { border-color: var(--terminal-green); }
        .url-input.invalid { border-color: var(--terminal-red); }

        .btn { 
            background: var(--accent-primary); color: #000; border: none; 
            padding: 1.1rem; border-radius: 12px; font-size: 0.9rem; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; 
            transition: all 0.3s var(--bezier-fluid); display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,255,255,0.15); }
        .btn:active { transform: scale(0.97); }
        .btn-outline { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .btn-outline:hover { background: rgba(255,255,255,0.05); border-color: #fff; }

        .result-zone { display: none; flex-direction: column; align-items: center; gap: 1.5rem; margin-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1.5rem; animation: slideDown 0.5s var(--bezier-fluid); }
        .qr-wrapper { background: #fff; padding: 1rem; border-radius: 16px; box-shadow: 0 15px 30px rgba(0,0,0,0.8); }
        .actions-row { display: flex; gap: 1rem; width: 100%; }

        .toast-container { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { 
            background: rgba(20, 20, 25, 0.9); border: 1px solid rgba(255,255,255,0.1); color: #fff; 
            padding: 1rem 2rem; border-radius: 30px; font-size: 0.85rem; font-weight: 600; letter-spacing: 1px;
            backdrop-filter: blur(10px); box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: toastIn 0.4s var(--bezier-fluid) forwards;
        }
        @keyframes toastIn { from { opacity: 0; transform: translateY(20px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes toastOut { from { opacity: 1; transform: translateY(0) scale(1); } to { opacity: 0; transform: translateY(-20px) scale(0.9); } }
    </style>
</head>
<body>
    <div class="ambient-grid"></div>

    <div class="container">
        <header>
            <h1>OTA <span>BLACK</span></h1>
            <p>VOID PLATFORM • SECURE DEPLOYMENT</p>
        </header>

        <div class="void-panel">
            <div id="drop-zone">
                <svg class="drop-icon" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <div class="drop-text">
                    <h3>DROP PAYLOAD</h3>
                    <p>Supported format: .ipa</p>
                </div>
                <input type="file" id="file-input" multiple accept=".ipa" hidden>
            </div>
            
            <div id="terminal" class="terminal-container"></div>
        </div>

        <div id="apps-container" class="apps-grid"></div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script>
        class OTADeployer {
            constructor() {
                this.dropZone = document.getElementById('drop-zone');
                this.fileInput = document.getElementById('file-input');
                this.appsContainer = document.getElementById('apps-container');
                this.terminal = document.getElementById('terminal');
                this.toastContainer = document.getElementById('toast-container');
                this.isProcessing = false;

                this.setupMouseTracking();
                this.setupEventListeners();
            }

            setupMouseTracking() {
                document.addEventListener('mousemove', (e) => {
                    requestAnimationFrame(() => {
                        document.body.style.setProperty('--mouse-x', `${e.clientX}px`);
                        document.body.style.setProperty('--mouse-y', `${e.clientY}px`);
                    });
                });
            }

            setupEventListeners() {
                this.dropZone.addEventListener('click', () => this.fileInput.click());
                
                ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
                    this.dropZone.addEventListener(evt, (e) => { e.preventDefault(); e.stopPropagation(); }, false);
                });

                ['dragenter', 'dragover'].forEach(evt => {
                    this.dropZone.addEventListener(evt, () => this.dropZone.classList.add('dragover'), false);
                });

                ['dragleave', 'drop'].forEach(evt => {
                    this.dropZone.addEventListener(evt, () => this.dropZone.classList.remove('dragover'), false);
                });

                this.dropZone.addEventListener('drop', (e) => this.processFiles(e.dataTransfer.files));
                this.fileInput.addEventListener('change', (e) => this.processFiles(e.target.files));
            }

            showToast(message, duration = 3000) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                this.toastContainer.appendChild(toast);

                setTimeout(() => {
                    toast.style.animation = 'toastOut 0.4s var(--bezier-fluid) forwards';
                    setTimeout(() => toast.remove(), 400);
                }, duration);
            }

            async typeTerminalLine(text, type = 'info') {
                this.terminal.style.display = 'block';
                const lineObj = document.createElement('div');
                lineObj.className = 'term-line';
                
                const timeStr = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit', fractionalSecondDigits: 2 }).replace(':',':');
                
                const timeSpan = document.createElement('span');
                timeSpan.className = 'term-time';
                timeSpan.textContent = `[${timeStr}] `;
                
                const msgSpan = document.createElement('span');
                msgSpan.className = `term-msg ${type}`;
                
                const cursor = document.createElement('span');
                cursor.className = 'cursor';

                lineObj.appendChild(timeSpan);
                lineObj.appendChild(msgSpan);
                lineObj.appendChild(cursor);
                this.terminal.appendChild(lineObj);

                for (let i = 0; i < text.length; i++) {
                    await new Promise(r => setTimeout(r, 10)); 
                    msgSpan.textContent += text.charAt(i);
                    this.terminal.scrollTop = this.terminal.scrollHeight;
                }
                cursor.remove(); 
            }

            async processFiles(files) {
                if (this.isProcessing) return;
                
                const ipaFiles = Array.from(files).filter(f => f.name.toLowerCase().endsWith('.ipa'));
                if (ipaFiles.length === 0) {
                    this.showToast('INVALID FORMAT. SYSTEM REQUIRES .IPA');
                    return;
                }

                this.isProcessing = true;
                this.terminal.innerHTML = ''; 
                await this.typeTerminalLine(`INITIATING VOID ENGINE SECURE PROTOCOL...`, 'info');
                await this.typeTerminalLine(`DETECTED ${ipaFiles.length} PAYLOAD(S).`, 'info');

                for (const file of ipaFiles) {
                    await this.typeTerminalLine(`MOUNTING: ${file.name}`, 'info');
                    try {
                        const parser = new AppInfoParser(file);
                        await this.typeTerminalLine(`DECRYPTING INFO.PLIST STRUCTURE...`, 'warn');
                        const result = await parser.parse();
                        await this.typeTerminalLine(`SUCCESS: BUNDLE ID EXTRACTED.`, 'info');
                        this.renderAppCard(result, file.name);
                    } catch (error) {
                        await this.typeTerminalLine(`CRITICAL: MEMORY LIMIT EXCEEDED FOR ${file.name}`, 'error');
                        await this.typeTerminalLine(`EXECUTING AUTO-RECOVERY PROTOCOL...`, 'warn');
                        
                        const fallbackData = {
                            CFBundleIdentifier: 'com.void.blackstore',
                            CFBundleShortVersionString: '1.0',
                            CFBundleName: file.name.replace('.ipa', ''),
                            icon: null 
                        };
                        this.renderAppCard(fallbackData, file.name);
                        await this.typeTerminalLine(`AUTO-RECOVERY COMPLETE. MANUAL INPUT REQUIRED.`, 'info');
                    }
                }
                
                this.fileInput.value = '';
                this.isProcessing = false;
                await this.typeTerminalLine(`AWAITING MANIFEST GENERATION...`, 'info');
            }

            renderAppCard(appData, filename) {
                const bundleId = appData.CFBundleIdentifier || 'com.void.blackstore';
                const version = appData.CFBundleShortVersionString || '1.0';
                const appName = appData.CFBundleName || appData.CFBundleDisplayName || filename.replace('.ipa', '');
                const fallbackIcon = 'https://up6.cc/2026/04/177500568816331.png';
                const iconSrc = appData.icon ? appData.icon : fallbackIcon;

                const card = document.createElement('div');
                card.className = 'void-panel app-card';
                card.innerHTML = `
                    <div class="app-header">
                        <img src="${iconSrc}" class="app-icon" alt="App Icon">
                        <div class="app-info">
                            <h3>${appName}</h3>
                            <p>${bundleId}</p>
                            <p>v${version}</p>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>DIRECT SOURCE URL (.IPA)</label>
                        <input type="url" class="url-input" placeholder="https://cdn.example.com/app.ipa" autocomplete="off" spellcheck="false">
                    </div>
                    <button class="btn generate-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        BUILD MANIFEST
                    </button>
                    <div class="result-zone">
                        <div class="qr-wrapper"></div>
                        <div class="actions-row">
                            <button class="btn btn-outline edit-btn">EDIT</button>
                            <button class="btn copy-btn">COPY BEACON</button>
                        </div>
                        <div class="sync-section" style="margin-top: 1rem; padding-top: 1.5rem; border-top: 1px dashed var(--glass-border); width: 100%;">
                            <div class="input-group">
                                <label style="color: var(--accent-glow);">TARGET ENDPOINT (API / WEBHOOK URL)</label>
                                <input type="url" class="api-endpoint-input" placeholder="https://your-webhook-or-api.com/..." autocomplete="off" spellcheck="false" style="border-color: rgba(26,115,232,0.3);">
                            </div>
                            <button class="btn sync-btn" style="margin-top: 1rem; background: var(--accent-glow); color: #fff; border: 1px solid var(--accent-glow);">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
                                SECURE TRANSMIT TO STORE
                            </button>
                        </div>
                    </div>
                `;

                this.appsContainer.prepend(card);
                this.attachCardEvents(card, bundleId, version, appName, iconSrc);
            }

            attachCardEvents(card, bundleId, version, appName, iconSrc) {
                const urlInput = card.querySelector('.url-input');
                const generateBtn = card.querySelector('.generate-btn');
                const resultZone = card.querySelector('.result-zone');
                const qrWrapper = card.querySelector('.qr-wrapper');
                const copyBtn = card.querySelector('.copy-btn');
                const editBtn = card.querySelector('.edit-btn');
                const syncBtn = card.querySelector('.sync-btn');
                const apiEndpointInput = card.querySelector('.api-endpoint-input');

                urlInput.addEventListener('input', (e) => {
                    const val = e.target.value.trim();
                    if(val === '') { urlInput.className = 'url-input'; }
                    else if(val.startsWith('https://')) { urlInput.className = 'url-input valid'; }
                    else { urlInput.className = 'url-input invalid'; }
                });

                const getItmsLink = () => {
                    const manifestParams = new URLSearchParams({ ipa_url: urlInput.value.trim(), bundle_id: bundleId, version: version, app_name: appName });
                    return `itms-services://?action=download-manifest&url=${encodeURIComponent(window.location.origin + '/api/manifest?' + manifestParams.toString())}`;
                };

                const buildManifest = async () => {
                    if (!urlInput.value.trim().startsWith('https://')) {
                        this.showToast('SECURE CONNECTION (HTTPS) REQUIRED BY APPLE.');
                        urlInput.focus();
                        return;
                    }
                    await this.typeTerminalLine(`COMPILING XML MANIFEST...`, 'info');
                    
                    qrWrapper.innerHTML = ''; 
                    new QRCode(qrWrapper, { text: getItmsLink(), width: 140, height: 140, colorDark : "#000", colorLight : "#fff", correctLevel : QRCode.CorrectLevel.L });

                    resultZone.style.display = 'flex';
                    generateBtn.style.display = 'none';
                    urlInput.setAttribute('readonly', 'true');
                    urlInput.style.opacity = '0.5';
                    await this.typeTerminalLine(`DEPLOYMENT BEACON GENERATED SUCCESSFULLY.`, 'info');
                };

                generateBtn.addEventListener('click', buildManifest);

                editBtn.addEventListener('click', () => {
                    resultZone.style.display = 'none';
                    generateBtn.style.display = 'flex';
                    generateBtn.innerHTML = 'UPDATE MANIFEST';
                    urlInput.removeAttribute('readonly');
                    urlInput.style.opacity = '1';
                    urlInput.focus();
                });

                copyBtn.addEventListener('click', () => {
                    navigator.clipboard.writeText(getItmsLink()).then(() => {
                        this.showToast('BEACON COPIED TO CLIPBOARD');
                        const originalText = copyBtn.textContent;
                        copyBtn.textContent = 'SECURED';
                        copyBtn.style.background = 'var(--terminal-green)';
                        setTimeout(() => {
                            copyBtn.textContent = originalText;
                            copyBtn.style.background = 'var(--accent-primary)';
                        }, 2000);
                    });
                });

                // 🔥 منطق المزامنة الآمنة عبر البروكسي (Backend Proxy Sync) 🔥
                syncBtn.addEventListener('click', async () => {
                    const endpointUrl = apiEndpointInput.value.trim();

                    if (!endpointUrl || !endpointUrl.startsWith('http')) {
                        this.showToast('ERROR: INVALID TARGET ENDPOINT URL.');
                        apiEndpointInput.focus();
                        apiEndpointInput.style.borderColor = 'var(--terminal-red)';
                        setTimeout(() => apiEndpointInput.style.borderColor = 'rgba(26,115,232,0.3)', 2000);
                        return;
                    }

                    const appData = {
                        name: appName,
                        bundle_id: bundleId,
                        version: version,
                        icon_url: iconSrc,
                        direct_ipa_url: urlInput.value.trim(),
                        install_button_link: getItmsLink(),
                        timestamp: new Date().toISOString()
                    };

                    try {
                        const originalText = syncBtn.innerHTML;
                        syncBtn.innerHTML = 'SECURE SYNCING...';
                        syncBtn.style.opacity = '0.7';
                        syncBtn.style.pointerEvents = 'none';

                        await this.typeTerminalLine(`INITIATING SECURE PROXY CONNECTION TO TARGET...`, 'warn');

                        // إرسال البيانات للوسيط (api/sync.js) في Vercel وليس للخارج مباشرة
                        const response = await fetch('/api/sync', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                targetUrl: endpointUrl,
                                appData: appData
                            })
                        });

                        const result = await response.json();

                        if (response.ok && result.success) {
                            this.showToast('SECURE PAYLOAD TRANSMITTED!');
                            await this.typeTerminalLine(`SUCCESS: DB UPDATED VIA SECURE PROXY.`, 'info');
                            syncBtn.innerHTML = 'TRANSMITTED ✔';
                            syncBtn.style.background = 'var(--terminal-green)';
                            syncBtn.style.color = '#000';
                            syncBtn.style.borderColor = 'var(--terminal-green)';
                        } else {
                            throw new Error(result.error || 'Unknown server error');
                        }

                    } catch (error) {
                        console.error('Secure Transmission Error:', error);
                        this.showToast('ERROR: SECURE TRANSMISSION FAILED.');
                        await this.typeTerminalLine(`CRITICAL: SECURE PROXY REJECTED CONNECTION.`, 'error');
                        syncBtn.innerHTML = 'TRANSMISSION FAILED ✖';
                        syncBtn.style.background = 'var(--terminal-red)';
                        syncBtn.style.borderColor = 'var(--terminal-red)';
                        
                        setTimeout(() => {
                            syncBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg> SECURE TRANSMIT TO STORE';
                            syncBtn.style.background = 'var(--accent-glow)';
                            syncBtn.style.color = '#fff';
                            syncBtn.style.borderColor = 'var(--accent-glow)';
                            syncBtn.style.opacity = '1';
                            syncBtn.style.pointerEvents = 'auto';
                        }, 3000);
                    }
                });
            }
        }

        const otaEngine = new OTADeployer();
    </script>
</body>
</html>
